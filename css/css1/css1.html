<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="G:\фото\пепе.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Составной заголовок -->
        <div class="header">
            <div class="header-icon">✓</div>
            <h1 class="header-title">Список дел</h1>
        </div>

        <!-- Панель создания -->
        <div class="create-panel">
            <input type="text" class="create-input" placeholder="Новое дело" value="Новое дело">
            <div class="create-actions">
                <button class="btn btn-primary">Создать</button>
                <button class="btn btn-danger">Очистить</button>
            </div>
        </div>

        <!-- Список дел -->
        <div class="todo-list-wrapper">
            <ul class="todo-list">
                <li class="todo-item">
                    <div class="todo-content">
                        <input type="checkbox">
                        <span class="todo-icon">📌</span>
                        <div class="todo-text-container">
                            <span class="todo-text">Покормить кота (очень длинное дело чтобы проверить перенос текста)</span>
                            <span class="todo-date">Сегодня, 15:30</span>
                        </div>
                    </div>
                    <button class="delete-btn">✕</button>
                </li>
                <li class="todo-item">
                    <div class="todo-content">
                        <input type="checkbox">
                        <span class="todo-icon">📌</span>
                        <div class="todo-text-container">
                            <span class="todo-text">Покормить кота</span>
                            <span class="todo-date">Завтра, 10:00</span>
                        </div>
                    </div>
                    <button class="delete-btn">✕</button>
                </li>
                <li class="todo-item">
                    <div class="todo-content">
                        <input type="checkbox">
                        <span class="todo-icon">📌</span>
                        <div class="todo-text-container">
                            <span class="todo-text">Полить цветы</span>
                            <span class="todo-date">Среда, 18:45</span>
                        </div>
                    </div>
                    <button class="delete-btn">✕</button>
                </li>
            </ul>
            
            <div class="empty-message">
                Не найдено ни одного дела
            </div>
        </div>
    </div>
    <footer class="footer">
        <hr>
        <p>Copyright ©</p>
    </footer>
</body>
</html>
